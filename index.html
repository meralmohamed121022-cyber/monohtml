<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Online Viewer PRO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/eclipse.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldgutter.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jshint/2.13.6/jshint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/htmlhint/0.11.4/htmlhint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/csslint/1.0.5/csslint.js"></script>

<style>
body { margin: 0; display: flex; height: 100vh; font-family: Arial, sans-serif; transition: 0.3s; overflow: hidden; }

body.dark-mode { background-color: #0a192f; color: #ffffff; }
body.light-mode { background-color: #f4f6f8; color: #333333; }

.sidebar { width: 220px; padding: 15px; display: flex; flex-direction: column; gap: 10px; transition: 0.3s; overflow-y: auto; z-index: 10; }
body.dark-mode .sidebar { background-color: #112240; border-right: 1px solid #233554; }
body.light-mode .sidebar { background-color: #ffffff; border-right: 1px solid #e2e8f0; }

.sidebar h2 { text-align: center; font-size: 16px; margin: 0 0 15px 0; color: #ff8c00; }
.sidebar button, .file-upload-label { padding: 10px; border: none; cursor: pointer; text-align: left; font-size: 14px; border-radius: 4px; font-weight: bold; transition: 0.2s; }

body.dark-mode .sidebar button, body.dark-mode .file-upload-label { background-color: #1a365d; color: #ffffff; }
body.dark-mode .sidebar button:hover, body.dark-mode .file-upload-label:hover { background-color: #ff8c00; }

body.light-mode .sidebar button, body.light-mode .file-upload-label { background-color: #e2e8f0; color: #1a202c; }
body.light-mode .sidebar button:hover, body.light-mode .file-upload-label:hover { background-color: #ff8c00; color: #ffffff; }

.main-area { display: flex; flex: 1; overflow: hidden; }
.editor-box { flex: 1; display: flex; flex-direction: column; width: 50%; border-right: 2px solid #ff8c00; position: relative; }
.preview-box { flex: 1; display: flex; flex-direction: column; width: 50%; background: #ffffff; }
iframe { flex: 1; width: 100%; height: 100%; border: none; background-color: #ffffff; }

.CodeMirror { height: 100% !important; font-size: 15px; font-family: monospace; transition: 0.3s; }
body.dark-mode .CodeMirror { background-color: #0a192f !important; color: #ffffff !important; }
body.dark-mode .CodeMirror-gutters { background-color: #112240 !important; border-right: 1px solid #233554 !important; }
body.dark-mode .CodeMirror-linenumber { color: #8892b0 !important; }
body.dark-mode .CodeMirror-activeline-background { background: rgba(255, 140, 0, 0.1) !important; }
body.dark-mode .CodeMirror-cursor { border-left: 2px solid #ff8c00 !important; }

body.light-mode .CodeMirror { background-color: #ffffff !important; color: #333333 !important; }
body.light-mode .CodeMirror-gutters { background-color: #f8fafc !important; border-right: 1px solid #e2e8f0 !important; }
body.light-mode .CodeMirror-linenumber { color: #64748b !important; }
body.light-mode .CodeMirror-activeline-background { background: rgba(255, 140, 0, 0.1) !important; }
body.light-mode .CodeMirror-cursor { border-left: 2px solid #ff8c00 !important; }

body.dark-mode .cm-s-monokai .cm-tag { color: #ff8c00 !important; font-weight: bold; }
body.dark-mode .cm-s-monokai .cm-string { color: #a3e635 !important; }
body.dark-mode .cm-s-monokai .cm-keyword { color: #60a5fa !important; font-weight: bold; }
body.dark-mode .cm-s-monokai .cm-variable { color: #ffffff !important; }
body.dark-mode .cm-s-monokai .cm-def { color: #facc15 !important; }

input[type="file"] { display: none; }

.search-panel { position: absolute; top: 10px; right: 20px; z-index: 100; padding: 15px; border-radius: 8px; width: 320px; display: none; flex-direction: column; gap: 10px; transition: 0.3s; }
body.dark-mode .search-panel { background: #112240; box-shadow: 0 4px 15px rgba(0,0,0,0.6); border: 1px solid #233554; }
body.light-mode .search-panel { background: #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }

.search-header { display: flex; justify-content: space-between; font-weight: bold; align-items: center; color: #ff8c00; }
.search-header span { font-size: 15px; }
.search-header button { background: none; border: none; cursor: pointer; font-size: 16px; }
body.dark-mode .search-header button { color: #ffffff; }
body.light-mode .search-header button { color: #333333; }

.search-inputs { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 4px; }
body.dark-mode .search-inputs { background: #0a192f; border: 1px solid #233554; }
body.light-mode .search-inputs { background: #f8fafc; border: 1px solid #e2e8f0; }

.search-inputs input { border: none; background: transparent; outline: none; flex: 1; font-size: 14px; }
body.dark-mode .search-inputs input { color: #ffffff; }
body.light-mode .search-inputs input { color: #333333; }

.search-inputs span { font-size: 12px; white-space: nowrap; font-weight: bold; }
body.dark-mode .search-inputs span { color: #8892b0; }
body.light-mode .search-inputs span { color: #64748b; }

.search-actions { display: flex; gap: 5px; }
.search-actions button { flex: 1; padding: 8px; cursor: pointer; border: none; background: #ff8c00; color: #ffffff; border-radius: 4px; font-weight: bold; }
.search-actions button:hover { background: #e07b00; }
.search-actions .nav-btn { flex: 0.5; }
body.dark-mode .search-actions .nav-btn { background: #1a365d; }
body.dark-mode .search-actions .nav-btn:hover { background: #233554; }
body.light-mode .search-actions .nav-btn { background: #94a3b8; }
body.light-mode .search-actions .nav-btn:hover { background: #64748b; }

.cm-searching { background-color: rgba(255, 140, 0, 0.5); }
</style>
</head>
<body class="dark-mode">

<div class="sidebar">
<h2>HTML Viewer PRO</h2>
<button id="btnNewTab">Preview in New Tab 🌐</button>
<button id="btnTheme">Toggle Theme 🌙/☀️</button>
<label class="file-upload-label">
    Import File 📁
    <input type="file" id="fileInput" accept=".html,.js,.css,.txt,.json">
</label>
<button id="btnPreview">Run Preview ▶️</button>
<button id="btnSearch">Find & Replace 🔍</button>
<button id="btnExportHtml">Export HTML 📄</button>
<button id="btnExportJson">Export JSON 📦</button>
<button id="btnExportImg">Export Image 🖼️</button>
<button id="btnExportPdf">Export PDF 📑</button>
<button id="btnClear">Clear 🗑️</button>
</div>

<div class="main-area">
<div class="editor-box">
    <div id="searchPanel" class="search-panel">
        <div class="search-header">
            <span>Find & Replace</span>
            <button onclick="closeSearch()">✖</button>
        </div>
        <div class="search-inputs">
            <input type="text" id="searchInput" placeholder="Search for...">
            <span id="matchCount">0 of 0</span>
        </div>
        <div class="search-inputs">
            <input type="text" id="replaceInput" placeholder="Replace with...">
        </div>
        <div class="search-actions">
            <button class="nav-btn" onclick="prevMatch()">▲</button>
            <button class="nav-btn" onclick="nextMatch()">▼</button>
            <button onclick="replaceMatch()">Replace</button>
            <button onclick="replaceAllMatches()">All</button>
        </div>
    </div>
    <textarea id="htmlInput"></textarea>
</div>
<div class="preview-box"><iframe id="previewFrame"></iframe></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/searchcursor.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/selection/active-line.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldgutter.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/brace-fold.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/xml-fold.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/javascript-lint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/html-lint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/css-lint.min.js"></script>

<script>
const editor = CodeMirror.fromTextArea(document.getElementById('htmlInput'), {
    mode: 'htmlmixed',
    theme: 'monokai',
    lineNumbers: true,
    autoCloseTags: true,
    lineWrapping: true,
    styleActiveLine: true,
    matchBrackets: true,
    autoCloseBrackets: true,
    foldGutter: true,
    gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter", "CodeMirror-lint-markers"],
    lint: true
});

const previewFrame = document.getElementById('previewFrame');

function updatePreview() {
    previewFrame.srcdoc = editor.getValue();
}

editor.on('change', updatePreview);
document.getElementById('btnPreview').addEventListener('click', updatePreview);

document.getElementById('btnTheme').addEventListener('click', function() {
    const isDark = document.body.classList.contains('dark-mode');
    document.body.classList.toggle('dark-mode', !isDark);
    document.body.classList.toggle('light-mode', isDark);
    editor.setOption('theme', isDark ? 'eclipse' : 'monokai');
});

// تفعيل تحديد الدالة بالكامل عند الضغط المزدوج على القوس
editor.on('dblclick', function(cm, event) {
    let pos = cm.getCursor();
    let match = cm.findMatchingBracket(pos);
    if (match && match.match) {
        let from = match.forward ? match.from : match.to;
        let to = match.forward ? match.to : match.from;
        to.ch += 1; 
        cm.setSelection(from, to);
    }
});

document.getElementById('btnNewTab').addEventListener('click', function() {
    const newWin = window.open();
    newWin.document.open();
    newWin.document.write(editor.getValue());
    newWin.document.close();
});

document.getElementById('btnClear').addEventListener('click', function() {
    editor.setValue('');
    updatePreview();
});

document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        editor.setValue(e.target.result);
        updatePreview();
    };
    reader.readAsText(file);
});

document.getElementById('btnExportHtml').addEventListener('click', function() {
    const blob = new Blob([editor.getValue()], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'code.html';
    a.click();
    URL.revokeObjectURL(url);
});

document.getElementById('btnExportJson').addEventListener('click', function() {
    const blob = new Blob([editor.getValue()], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'code.json';
    a.click();
    URL.revokeObjectURL(url);
});

document.getElementById('btnExportImg').addEventListener('click', function() {
    html2canvas(previewFrame.contentDocument.body).then(canvas => {
        const link = document.createElement('a');
        link.download = 'preview.png';
        link.href = canvas.toDataURL();
        link.click();
    });
});

document.getElementById('btnExportPdf').addEventListener('click', function() {
    let previewBody = previewFrame.contentDocument.body;
    let originalBg = previewBody.style.backgroundColor;
    // فرض خلفية بيضاء قبل استخراج الـ PDF لضمان وضوح المحتوى
    previewBody.style.backgroundColor = '#ffffff'; 

    let opt = {
        margin: 0.5,
        filename: 'preview.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    };
    
    html2pdf().set(opt).from(previewBody).save().then(() => {
        // إرجاع الخلفية لأصلها بعد التحميل
        previewBody.style.backgroundColor = originalBg; 
    });
});

let searchCursor = null;
let query = "";
let matchIndex = 0;
let totalMatches = 0;
let searchOverlay = null;

function updateMatchCount() {
    query = document.getElementById('searchInput').value;
    let countSpan = document.getElementById('matchCount');
    
    if (!query) {
        countSpan.innerText = '0 of 0';
        if (searchOverlay) editor.removeOverlay(searchOverlay);
        return;
    }
    
    let cursor = editor.getSearchCursor(query);
    totalMatches = 0;
    while (cursor.findNext()) { totalMatches++; }
    
    if (totalMatches > 0) {
        matchIndex = 1;
        countSpan.innerText = matchIndex + ' of ' + totalMatches;
        searchCursor = editor.getSearchCursor(query);
        searchCursor.findNext();
        editor.setSelection(searchCursor.from(), searchCursor.to());
        editor.scrollIntoView({from: searchCursor.from(), to: searchCursor.to()}, 100);
    } else {
        countSpan.innerText = '0 of 0';
    }
    
    if (searchOverlay) editor.removeOverlay(searchOverlay);
    searchOverlay = {
        token: function(stream) {
            let safeQuery = query.replace(/[\-\[\]\/\{\}\(\)\*\+\?\.\\\^\$\|]/g, "\\$&");
            let re = new RegExp(safeQuery, "gi");
            re.lastIndex = stream.pos;
            let match = re.exec(stream.string);
            if (match && match.index === stream.pos) {
                stream.pos += match[0].length;
                return "searching";
            } else if (match) {
                stream.pos = match.index;
            } else {
                stream.skipToEnd();
            }
        }
    };
    editor.addOverlay(searchOverlay);
}

document.getElementById('searchInput').addEventListener('input', updateMatchCount);

function nextMatch() {
    if (!searchCursor || totalMatches === 0) return;
    if (!searchCursor.findNext()) {
        searchCursor = editor.getSearchCursor(query);
        searchCursor.findNext();
        matchIndex = 1;
    } else {
        matchIndex++;
    }
    document.getElementById('matchCount').innerText = matchIndex + ' of ' + totalMatches;
    editor.setSelection(searchCursor.from(), searchCursor.to());
    editor.scrollIntoView({from: searchCursor.from(), to: searchCursor.to()}, 100);
}

function prevMatch() {
    if (!searchCursor || totalMatches === 0) return;
    if (!searchCursor.findPrevious()) {
        searchCursor = editor.getSearchCursor(query);
        while(searchCursor.findNext()){}
        searchCursor.findPrevious();
        matchIndex = totalMatches;
    } else {
        matchIndex--;
    }
    document.getElementById('matchCount').innerText = matchIndex + ' of ' + totalMatches;
    editor.setSelection(searchCursor.from(), searchCursor.to());
    editor.scrollIntoView({from: searchCursor.from(), to: searchCursor.to()}, 100);
}

function replaceMatch() {
    if (!searchCursor || totalMatches === 0) return;
    let replaceText = document.getElementById('replaceInput').value;
    searchCursor.replace(replaceText);
    updateMatchCount();
}

function replaceAllMatches() {
    let replaceText = document.getElementById('replaceInput').value;
    if (!query) return;
    let cursor = editor.getSearchCursor(query);
    while (cursor.findNext()) {
        cursor.replace(replaceText);
    }
    updateMatchCount();
}

document.getElementById('btnSearch').addEventListener('click', function() {
    let panel = document.getElementById('searchPanel');
    panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
    if (panel.style.display === 'flex') {
        document.getElementById('searchInput').focus();
        let selectedText = editor.getSelection();
        if (selectedText) {
            document.getElementById('searchInput').value = selectedText;
            updateMatchCount();
        }
    } else {
        closeSearch();
    }
});

function closeSearch() {
    document.getElementById('searchPanel').style.display = 'none';
    if (searchOverlay) {
        editor.removeOverlay(searchOverlay);
        searchOverlay = null;
    }
    editor.focus();
}
</script>
</body>
</html>
