<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONO-CODE-SHOW</title>
<link rel="icon" type="image/png" href="https://github.com/meralmohamed121022-cyber/Drug-Monograph/blob/main/6_20251129_184528_0005.png?raw=true">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ext-language_tools.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify-html.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
/* Layout */
body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: Arial, sans-serif; transition: 0.3s; overflow: hidden; }
body.dark-mode { background-color: #0d1117; color: #c9d1d9; }
body.light-mode { background-color: #f6f8fa; color: #24292e; }

/* Navigation Bar */
.topbar { width: 100%; padding: 12px 15px; display: flex; flex-direction: row; align-items: center; gap: 10px; transition: 0.3s; z-index: 10; box-sizing: border-box; flex-wrap: wrap; }
body.dark-mode .topbar { background-color: #161b22; border-bottom: 2px solid #003366; }
body.light-mode .topbar { background-color: #ffffff; border-bottom: 2px solid #003366; }
.topbar h2 { margin: 0 15px 0 0; font-size: 16px; color: #ff8c00; font-weight: bold; }

/* Contact & Avatar */
.contact-section { display: flex; align-items: center; gap: 10px; margin-left: auto; padding-right: 10px; }
.mo-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ff8c00; box-shadow: 2px 2px 0px #003366; object-fit: cover; }
.social-icons { display: flex; gap: 8px; }
.social-icons a { text-decoration: none; color: #ffffff; background: #003366; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; border: 1.5px solid #003366; box-shadow: 2px 2px 0px #ff8c00; transition: 0.2s; }
.social-icons a:hover { transform: translateY(-2px); background: #ff8c00; box-shadow: 2px 2px 0px #003366; }

/* Responsive Device Selectors */
.device-selector { display: flex; gap: 5px; background: rgba(0, 51, 102, 0.1); padding: 5px; border-radius: 20px; border: 1px solid #003366; }
.device-btn { background: none !important; border: none !important; box-shadow: none !important; color: #003366 !important; font-size: 16px !important; padding: 5px 10px !important; border-radius: 15px !important; cursor: pointer; transition: 0.3s; }
.device-btn.active { background-color: #ff8c00 !important; color: white !important; }
body.dark-mode .device-btn { color: #c9d1d9 !important; }

/* 3D Action Buttons */
.topbar button, .file-upload-label { padding: 8px 14px; cursor: pointer; text-align: center; font-size: 13px; border-radius: 25px; font-weight: bold; transition: all 0.2s ease; white-space: nowrap; display: flex; align-items: center; gap: 5px; background-color: #003366; color: #ffffff; border: 2px solid #003366; box-shadow: 4px 4px 0px #ff8c00; }
.topbar button:hover, .file-upload-label:hover { background-color: #ff8c00; box-shadow: 4px 4px 0px #003366; transform: translateY(-2px); }
.topbar button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #003366; }

/* Editor & Preview */
.main-area { display: flex; flex: 1; width: 100%; overflow: hidden; position: relative; }
.editor-box { width: 50%; height: 100%; display: flex; flex-direction: column; position: relative; }
.preview-box { flex: 1; height: 100%; display: flex; flex-direction: column; background: #e0e0e0; overflow: auto; align-items: center; padding-top: 20px; transition: 0.3s; }
#previewFrame { width: 100%; height: 100%; border: none; background-color: #ffffff; transition: 0.4s; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
#previewFrame.mobile { width: 375px; height: 667px; border: 12px solid #333; border-radius: 30px; }
#previewFrame.tablet { width: 768px; height: 1024px; border: 15px solid #333; border-radius: 20px; }

.resizer { width: 6px; background-color: #ff8c00; cursor: col-resize; z-index: 500; transition: 0.2s; border-left: 1px solid #003366; border-right: 1px solid #003366;}
#htmlInput { flex: 1; width: 100%; height: 100%; font-size: 15px; }

/* Draggable Search Panel */
.search-panel { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; padding: 15px; border-radius: 25px; width: 300px; display: none; flex-direction: column; gap: 10px; border: 3px solid #003366; box-shadow: 6px 6px 0px #ff8c00; background: #ffffff; }
body.dark-mode .search-panel { background: #161b22; }

/* Custom Syntax Colors (Red/Dark Blue) */
.ace_dark.ace_editor .ace_keyword, .ace_dark.ace_editor .ace_xml.ace_tag { color: #ff7b72 !important; }
.ace_dark.ace_editor .ace_attribute-name { color: #0066cc !important; font-weight: bold; }
.ace_dark.ace_editor .ace_string { color: #a6e22e !important; }
</style>
</head>
<body class="light-mode">

<div class="topbar">
    <h2>MONO-HTML-SHOW</h2>
    <button id="btnNewTab">🌐 New Tab</button>
    <button id="btnTheme">🌙/☀️ Theme</button>
    <div class="device-selector">
        <button class="device-btn active" onclick="setViewport('laptop', this)"><i class="fas fa-laptop"></i></button>
        <button class="device-btn" onclick="setViewport('tablet', this)"><i class="fas fa-tablet-alt"></i></button>
        <button class="device-btn" onclick="setViewport('mobile', this)"><i class="fas fa-mobile-alt"></i></button>
    </div>
    <button onclick="formatCode()">✨ Format</button>
    <label class="file-upload-label">📁 Import<input type="file" id="fileInput" style="display:none"></label>
    <button id="btnSearch">🔍 Search</button>
    <button id="btnExportHtml">📄 HTML</button>
    <button id="btnExportJson">📦 JSON</button>
    <button id="btnExportImg">🖼️ PHOTO</button>
    <button id="btnExportPdf">📑 PDF</button>
    <button id="btnClear">🗑️ Clear</button>

    <div class="contact-section">
        <img src="https://github.com/meralmohamed121022-cyber/Drug-Monograph/blob/main/6_20251129_184528_0005.png?raw=true" alt="Mo" class="mo-avatar">
        <div class="social-icons">
            <a href="https://wa.me/966541932559" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://facebook.com/mohamed.kholeif.92" target="_blank"><i class="fab fa-facebook-f"></i></a>
        </div>
    </div>
</div>

<div class="main-area">
    <div class="editor-box" id="editorBox">
        <div id="searchPanel" class="search-panel">
            <div id="searchHeader" style="display:flex; justify-content:space-between; cursor:move; color:#ff8c00; font-weight:bold; border-bottom:2px solid #003366; padding-bottom:5px;">
                <span>✥ DRAG SEARCH</span>
                <span onclick="closeSearch()" style="cursor:pointer">✖</span>
            </div>
            <div style="display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:20px; border:2px solid #003366; background:#f0f4f8; margin-top:10px;">
                <input type="text" id="searchInput" placeholder="Find..." style="border:none; background:transparent; outline:none; flex:1; font-weight:bold; color:#003366;">
                <span id="matchStatus" style="font-size:11px; font-weight:bold; color:#ff8c00;">0 matches</span>
            </div>
            <input type="text" id="replaceInput" placeholder="Replace..." style="padding:8px 12px; border-radius:20px; border:2px solid #003366; background:#f0f4f8; font-weight:bold; color:#003366; outline:none;">
            <div style="display:flex; gap:6px;">
                <button onclick="editor.findPrevious()" style="flex:0.3; background:#003366; color:white; border-radius:15px; border:none; padding:8px; cursor:pointer">▲</button>
                <button onclick="editor.findNext()" style="flex:0.3; background:#003366; color:white; border-radius:15px; border:none; padding:8px; cursor:pointer">▼</button>
                <button onclick="editor.replace(document.getElementById('replaceInput').value)" style="flex:1; background:#003366; color:white; border-radius:15px; border:none; padding:8px; cursor:pointer">Replace</button>
            </div>
        </div>
        <div id="htmlInput"></div>
    </div>
    <div class="resizer" id="resizer"></div>
    <div class="preview-box" id="previewBox"><iframe id="previewFrame"></iframe></div>
</div>

<script>
const editor = ace.edit("htmlInput");
editor.setTheme("ace/theme/textmate");
editor.session.setMode("ace/mode/html");
editor.setOptions({ fontSize: "15px", wrap: true, useWorker: false });

const previewFrame = document.getElementById('previewFrame');
const updatePreview = () => { 
    previewFrame.srcdoc = editor.getValue(); 
    previewFrame.onload = () => applyResponsiveZoom();
};
editor.session.on('change', updatePreview);

function getDocTitle() {
    const match = editor.getValue().match(/<title>(.*?)<\/title>/i);
    return (match && match[1]) ? match[1].trim().replace(/[/\\?%*:|"<>]/g, '-') : 'document';
}

function setViewport(device, btn) {
    document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    previewFrame.className = device === 'laptop' ? '' : device;
}

// Exports
document.getElementById('btnExportHtml').onclick = () => {
    const link = document.createElement('a');
    link.href = URL.createObjectURL(new Blob([editor.getValue()], {type:'text/html'}));
    link.download = getDocTitle() + '.html';
    link.click();
};

document.getElementById('btnExportJson').onclick = () => {
    const data = { title: getDocTitle(), code: editor.getValue(), timestamp: new Date() };
    const link = document.createElement('a');
    link.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 4)], {type:'application/json'}));
    link.download = getDocTitle() + '.json';
    link.click();
};

document.getElementById('btnExportImg').onclick = () => {
    const el = previewFrame.contentDocument.body;
    el.style.zoom = "1";
    html2canvas(el, { useCORS: true, scale: 2 }).then(canvas => {
        const link = document.createElement('a');
        link.download = getDocTitle() + '.png';
        link.href = canvas.toDataURL();
        link.click();
        applyResponsiveZoom();
    });
};

document.getElementById('btnExportPdf').onclick = () => {
    const el = previewFrame.contentDocument.body;
    el.style.zoom = "1";
    if (!el.style.backgroundColor || el.style.backgroundColor === 'transparent') el.style.backgroundColor = '#ffffff';
    html2canvas(el, { useCORS: true, scale: 2 }).then(canvas => {
        const imgW = 210, pdfH = Math.max(297, (canvas.height * imgW) / canvas.width);
        html2pdf().set({ margin: 0, filename: getDocTitle() + '.pdf', jsPDF: { unit: 'mm', format: [imgW, pdfH] } }).from(canvas).save().then(() => applyResponsiveZoom());
    });
};

document.getElementById('btnNewTab').onclick = () => {
    const win = window.open();
    win.document.write(editor.getValue());
    win.document.close();
};

// Search & Drag
const panel = document.getElementById("searchPanel"), header = document.getElementById("searchHeader");
let isDragging = false, offset = [0, 0];
header.onmousedown = (e) => { isDragging = true; offset = [panel.offsetLeft - e.clientX, panel.offsetTop - e.clientY]; };
document.onmousemove = (e) => { if (isDragging) { panel.style.left = (e.clientX + offset[0]) + "px"; panel.style.top = (e.clientY + offset[1]) + "px"; panel.style.transform = "none"; } };
document.onmouseup = () => isDragging = false;
function closeSearch() { panel.style.display = 'none'; editor.focus(); }

document.getElementById('searchInput').oninput = function() {
    document.getElementById('matchStatus').innerText = editor.findAll(this.value, { wrap: true }) + " matches";
};

document.getElementById('btnSearch').onclick = () => {
    panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    if (panel.style.display === 'flex') document.getElementById('searchInput').focus();
};

document.getElementById('btnTheme').onclick = () => {
    const isDark = document.body.classList.toggle('dark-mode');
    document.body.classList.toggle('light-mode', !isDark);
    editor.setTheme(isDark ? "ace/theme/monokai" : "ace/theme/textmate");
};

function formatCode() { editor.setValue(html_beautify(editor.getValue(), { indent_size: 4 }), -1); }
document.getElementById('btnClear').onclick = () => { editor.setValue(''); updatePreview(); };

// Resizer
const resizer = document.getElementById('resizer'), editorBox = document.getElementById('editorBox');
let isResizing = false;
resizer.onmousedown = () => isResizing = true;
window.onmousemove = (e) => { if (isResizing) { let p = (e.clientX / window.innerWidth) * 100; if (p > 10 && p < 90) editorBox.style.width = p + '%'; } };
window.onmouseup = () => isResizing = false;

function applyResponsiveZoom() {
    const doc = previewFrame.contentDocument; if (!doc?.body) return;
    doc.body.style.zoom = '1';
    let cw = doc.documentElement.scrollWidth, vw = previewFrame.clientWidth;
    if (cw > vw && vw > 0) doc.body.style.zoom = vw / cw;
}
new ResizeObserver(() => applyResponsiveZoom()).observe(document.getElementById('previewBox'));
</script>
</body>
</html>
