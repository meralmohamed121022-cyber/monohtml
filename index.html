<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONO-CODE-SHOW</title>

<link rel="icon" type="image/png" href="https://github.com/meralmohamed121022-cyber/Drug-Monograph/blob/main/6_20251129_184528_0005.png?raw=true">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.43.3/ace.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.43.3/ext-language_tools.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.4/beautify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.4/beautify-css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.4/beautify-html.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
/* Layout */
body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: Arial, sans-serif; transition: 0.3s; overflow: hidden; }
body.dark-mode { background-color: #0d1117; color: #c9d1d9; }
body.light-mode { background-color: #f6f8fa; color: #24292e; }

/* Navigation Bar */
.topbar { 
    width: 100%; padding: 12px 15px; display: flex; flex-direction: row; align-items: flex-start; 
    gap: 15px; transition: all 0.3s ease-in-out; z-index: 10; box-sizing: border-box; 
    border-bottom: 2px solid #003366; flex-shrink: 0;
}
body.dark-mode .topbar { background-color: #161b22; }
body.light-mode .topbar { background-color: #ffffff; }

.topbar.collapsed { padding: 6px 15px; border-bottom: 1px solid rgba(0,51,102,0.3); }

/* Brand Section */
.brand-section { display: flex; flex-direction: column; gap: 8px; border-right: 2px dashed rgba(0, 51, 102, 0.2); padding-right: 15px; transition: 0.3s; }
body.dark-mode .brand-section { border-right: 2px dashed rgba(255, 255, 255, 0.1); }
.topbar.collapsed .brand-section { border-right: none; flex-direction: row; align-items: center; }

.title-container { display: flex; align-items: center; gap: 10px; }

.modern-title { 
    margin: 0; font-size: 22px; font-weight: 900; 
    background: linear-gradient(45deg, #ff8c00, #ff3b00); 
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
    text-transform: uppercase; letter-spacing: 1.5px; 
    text-shadow: 2px 2px 4px rgba(0,0,0,0.1); transition: 0.3s;
}
.modern-title:hover { transform: scale(1.02); filter: drop-shadow(0 0 5px rgba(255, 140, 0, 0.5)); }

.collapse-btn { 
    background: #003366; color: #ffffff; border: none; border-radius: 50%; 
    width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; 
    box-shadow: 2px 2px 0px #ff8c00; transition: 0.2s; font-size: 12px; 
}

/* Avatar & Social */
.mo-avatar { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #ff8c00; box-shadow: 2px 2px 0px #003366; object-fit: cover; }
.social-icons { display: flex; gap: 6px; }
.social-icons a { text-decoration: none; color: #ffffff; background: #003366; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 12px; border: 1.5px solid #003366; box-shadow: 2px 2px 0px #ff8c00; transition: 0.2s; }

/* Toolbar Content */
.toolbar-content { display: flex; flex: 1; flex-wrap: wrap; gap: 10px; align-items: center; transition: max-height 0.3s ease-out, opacity 0.2s; overflow: hidden; }
.topbar.collapsed .toolbar-content { display: none; opacity: 0; }

.tool-group { display: flex; gap: 5px; border-right: 2px solid rgba(0, 51, 102, 0.2); padding-right: 10px; align-items: center; }
.tool-group:last-child { border-right: none; }

.device-selector { display: flex; gap: 2px; background: rgba(0, 51, 102, 0.1); padding: 4px; border-radius: 20px; border: 1px solid #003366; }
.device-btn { background: none !important; border: none !important; box-shadow: none !important; color: #003366 !important; font-size: 15px !important; padding: 4px 8px !important; border-radius: 15px !important; cursor: pointer; }
.device-btn.active { background-color: #ff8c00 !important; color: white !important; }

.tool-group button, .file-upload-label { padding: 6px 12px; cursor: pointer; text-align: center; font-size: 12px; border-radius: 20px; font-weight: bold; transition: all 0.2s ease; white-space: nowrap; display: flex; align-items: center; gap: 5px; background-color: #003366; color: #ffffff; border: 2px solid #003366; box-shadow: 3px 3px 0px #ff8c00; }

/* Main Area */
.main-area { display: flex; flex: 1; width: 100%; overflow: hidden; position: relative; }

/* Code Box - Forced Light Theme */
.editor-box { width: 50%; height: 100%; display: flex; flex-direction: column; position: relative; background: #ffffff !important; } 
body.dark-mode .editor-box { background: #001122 !important; }

.editor-tabs { display: flex; background: #003366; }
.tab-btn { flex: 1; padding: 8px; background: transparent; border: none; color: #a9b7c6; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; }
.tab-btn.active { background: #ff8c00; color: #ffffff; }

#htmlInput { flex: 1; width: 100%; height: 100%; font-size: 15px; }

/* SYNTAX COLORS - White Background for Light Mode */
.ace_editor { background-color: #ffffff !important; color: #000000 !important; }
.ace_gutter { background-color: #f0f0f0 !important; color: #333333 !important; border-right: 1px solid #cccccc !important; }

/* SYNTAX COLORS - Dark Mode Override */
.ace_dark.ace_editor { background-color: #001122 !important; color: #d4d4d4 !important; }
.ace_dark.ace_editor .ace_gutter { background-color: #001122 !important; color: #668099 !important; border-right: 1px solid #003366 !important; }

/* Preview Box - Deep Blue Background Always */
.preview-box { 
    flex: 1; height: 100%; display: flex; flex-direction: column; 
    background: #001f3f !important; /* Deep Blue behind Device */
    overflow: hidden; align-items: center; justify-content: center; 
    padding: 20px; transition: 0.3s; box-sizing: border-box;
}

#previewFrame { 
    width: 100%; height: 100%; border: none; background-color: #ffffff; 
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    box-shadow: 0 0 30px rgba(0,0,0,0.5); 
    transform-origin: center center;
}
#previewFrame.mobile { width: 375px !important; height: 667px !important; flex: none; border: 16px solid #1a1a1a; border-radius: 36px; margin: 0 auto; }
#previewFrame.tablet { width: 768px !important; height: 1024px !important; flex: none; border: 16px solid #1a1a1a; border-radius: 24px; margin: 0 auto; }

/* Resizer */
.resizer { width: 6px; background-color: #ff8c00; cursor: col-resize; z-index: 500; transition: 0.2s; border-left: 1px solid #003366; touch-action: none; }

/* Search Panel */
.search-panel { 
    position: absolute; top: 50px; left: 50%; transform: translateX(-50%); z-index: 2000; 
    padding: 15px; border-radius: 25px; width: 300px; display: none; flex-direction: column; gap: 10px; 
    border: 3px solid #003366; box-shadow: 6px 6px 0px #ff8c00; background: #ffffff; 
}

/* MOBILE RESPONSIVE MEDIA QUERIES */
@media (max-width: 768px) {
    .topbar { flex-direction: column; padding: 10px; height: auto; }
    .brand-section { flex-direction: row; justify-content: space-between; border-right: none; border-bottom: 2px dashed rgba(0, 51, 102, 0.2); padding-right: 0; padding-bottom: 10px; width: 100%; align-items: center; }
    .toolbar-content { flex-direction: column; width: 100%; gap: 8px; align-items: stretch; margin-top: 10px; }
    .tool-group { flex-wrap: wrap; justify-content: center; border-right: none; border-bottom: 1px solid rgba(0, 51, 102, 0.2); padding-right: 0; padding-bottom: 8px; }
    .tool-group:last-child { border-bottom: none; padding-bottom: 0; }
    .editor-tabs { flex-wrap: wrap; }
    .tab-btn { flex: 1 1 50%; border-bottom: 1px solid rgba(255,255,255,0.1); }
}
</style>
</head>
<body class="light-mode">

<div class="topbar" id="topbar">
    <div class="brand-section">
        <div class="title-container">
            <h2 class="modern-title">MONO-HTML</h2>
            <button class="collapse-btn" onclick="toggleToolbar()" title="Toggle Toolbar">
                <i class="fas fa-chevron-up" id="collapseIcon"></i>
            </button>
        </div>
        <div class="contact-section">
            <img src="https://github.com/meralmohamed121022-cyber/Drug-Monograph/blob/main/6_20251129_184528_0005.png?raw=true" alt="Mo" class="mo-avatar">
            <div class="social-icons">
                <a href="https://wa.me/966541932559" target="_blank"><i class="fab fa-whatsapp"></i></a>
                <a href="https://facebook.com/mohamed.kholeif.92" target="_blank"><i class="fab fa-facebook-f"></i></a>
            </div>
        </div>
    </div>

    <div class="toolbar-content" id="toolbarContent">
        <div class="tool-group">
            <button id="btnLayout" onclick="toggleLayout()"><i class="fas fa-layer-group"></i> Horizontal</button>
            <button id="btnTheme"><i class="fas fa-moon"></i> Theme</button>
            <div class="device-selector">
                <button class="device-btn active" onclick="setViewport('laptop', this)"><i class="fas fa-laptop"></i></button>
                <button class="device-btn" onclick="setViewport('tablet', this)"><i class="fas fa-tablet-alt"></i></button>
                <button class="device-btn" onclick="setViewport('mobile', this)"><i class="fas fa-mobile-alt"></i></button>
            </div>
        </div>

        <div class="tool-group">
            <button onclick="formatCode()"><i class="fas fa-magic"></i> Format</button>
            <label class="file-upload-label"><i class="fas fa-folder-open"></i> Import<input type="file" id="fileInput" accept=".html,.json,.txt,.css,.js" style="display:none"></label>
            <button id="btnSearch"><i class="fas fa-search"></i> Search</button>
            <button id="btnClear"><i class="fas fa-trash"></i> Clear</button>
        </div>

        <div class="tool-group" style="border: none;">
            <button id="btnNewTab"><i class="fas fa-external-link-alt"></i> Full</button>
            <button id="btnExportHtml">📄 HTML</button>
            <button id="btnExportJson">📦 JSON</button>
            <button id="btnExportImg">🖼️ IMG</button>
            <button id="btnExportPdf">📑 PDF</button>
        </div>
    </div>
</div>

<div class="main-area">
    <div class="editor-box" id="editorBox">
        <div class="editor-tabs">
            <button class="tab-btn active" onclick="switchTab('all', this)"><i class="fa-solid fa-layer-group"></i> All Code</button>
            <button class="tab-btn" onclick="switchTab('html', this)"><i class="fab fa-html5"></i> HTML</button>
            <button class="tab-btn" onclick="switchTab('css', this)"><i class="fab fa-css3-alt"></i> CSS</button>
            <button class="tab-btn" onclick="switchTab('js', this)"><i class="fab fa-js"></i> JS</button>
        </div>

        <div id="searchPanel" class="search-panel">
            <div id="searchHeader" style="display:flex; justify-content:space-between; cursor:move; color:#ff8c00; font-weight:bold; border-bottom:2px solid #003366; padding-bottom:5px;">
                <span>✥ DRAG SEARCH</span>
                <span onclick="closeSearch()" style="cursor:pointer">✖</span>
            </div>
            <div class="search-inputs" style="display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:20px; border:2px solid #003366; background:#f0f4f8; margin-top:10px;">
                <input type="text" id="searchInput" placeholder="Search for..." style="border:none; background:transparent; outline:none; flex:1; font-weight:bold; color:#555;">
                <span id="matchStatus" style="font-size:11px; font-weight:bold; color:#ff8c00;">0 matches</span>
            </div>
            <div class="search-inputs" style="display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:20px; border:2px solid #003366; background:#f0f4f8;">
                <input type="text" id="replaceInput" placeholder="Replace with..." style="border:none; background:transparent; outline:none; flex:1; font-weight:bold; color:#555;">
            </div>
            <div style="display:flex; gap:6px;">
                <button onclick="editor.findPrevious()" style="flex:0.3; background:#003366; color:white; border-radius:15px; border:none; padding:8px; cursor:pointer">▲</button>
                <button onclick="editor.findNext()" style="flex:0.3; background:#003366; color:white; border-radius:15px; border:none; padding:8px; cursor:pointer">▼</button>
                <button onclick="editor.replace(document.getElementById('replaceInput').value)" style="flex:1; background:#003366; color:white; border-radius:15px; border:none; padding:8px; cursor:pointer">Replace</button>
                <button onclick="editor.replaceAll(document.getElementById('replaceInput').value)" style="flex:1; background:#003366; color:white; border-radius:15px; border:none; padding:8px; cursor:pointer">All</button>
            </div>
        </div>
        
        <div id="htmlInput"></div>
    </div>
    
    <div class="resizer" id="resizer"></div>
    
    <div class="preview-box" id="previewBox">
        <iframe id="previewFrame"></iframe>
    </div>
</div>

<script>
// TOPBAR COLLAPSE LOGIC
function toggleToolbar() {
    const topbar = document.getElementById('topbar');
    const icon = document.getElementById('collapseIcon');
    
    topbar.classList.toggle('collapsed');
    
    if (topbar.classList.contains('collapsed')) {
        icon.className = 'fas fa-chevron-down';
    } else {
        icon.className = 'fas fa-chevron-up';
    }
    
    setTimeout(() => {
        editor.resize();
        applyResponsiveZoom();
    }, 300);
}

// ACE EDITOR & SESSIONS TABS LOGIC
ace.require("ace/ext/language_tools");
const editor = ace.edit("htmlInput");
editor.setTheme("ace/theme/textmate");
editor.setOptions({ fontSize: "15px", wrap: true, useWorker: false });

editor.commands.addCommand({
    name: "find",
    bindKey: {win: "Ctrl-F", mac: "Command-F"},
    exec: function(editor) {
        document.getElementById('btnSearch').click();
    }
});

const sessions = {
    all: ace.createEditSession("", "ace/mode/html"),
    html: ace.createEditSession("", "ace/mode/html"),
    css: ace.createEditSession("", "ace/mode/css"),
    js: ace.createEditSession("", "ace/mode/javascript")
};

let currentTab = 'all';
editor.setSession(sessions.all);

function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = tabId;
    editor.setSession(sessions[tabId]);
    editor.focus();
}

// PREVIEW COMPILATION LOGIC
const previewFrame = document.getElementById('previewFrame');

function getCompiledCode() {
    const htmlCode = sessions.html.getValue();
    const cssCode = sessions.css.getValue() ? `<style>${sessions.css.getValue()}<\/style>` : '';
    const jsCode = sessions.js.getValue() ? `<script>${sessions.js.getValue()}<\/script>` : '';
    const compiledParts = `${cssCode}\n${htmlCode}\n${jsCode}`;
    
    const allCode = sessions.all.getValue();
    
    if (htmlCode || sessions.css.getValue() || sessions.js.getValue()) {
        return compiledParts;
    } else {
        return allCode;
    }
}

const updatePreview = () => { 
    previewFrame.srcdoc = getCompiledCode(); 
    previewFrame.onload = () => applyResponsiveZoom();
};

Object.values(sessions).forEach(session => {
    session.on('change', updatePreview);
});

// LAYOUT TOGGLE
let isHorizontal = false;
function toggleLayout() {
    isHorizontal = !isHorizontal;
    const mainArea = document.querySelector('.main-area');
    const editorBox = document.getElementById('editorBox');
    const btn = document.getElementById('btnLayout');
    
    if (isHorizontal) {
        mainArea.classList.add('horizontal-layout');
        editorBox.style.width = '100%';
        editorBox.style.height = '50%';
        btn.innerHTML = '<i class="fas fa-columns"></i> Vertical';
    } else {
        mainArea.classList.remove('horizontal-layout');
        editorBox.style.height = '100%';
        editorBox.style.width = '50%';
        btn.innerHTML = '<i class="fas fa-layer-group"></i> Horizontal';
    }
    editor.resize();
    applyResponsiveZoom();
}

// FILE IMPORT
document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        let code = ev.target.result;
        sessions.all.setValue(code);
        
        let cssMatch = code.match(/<style[^>]*>([\s\S]*?)<\/style>/gi);
        let jsMatch = code.match(/<script[^>]*>([\s\S]*?)<\/script>/gi);
        let extractedCss = "", extractedJs = "", extractedHtml = code;

        if (cssMatch) {
            cssMatch.forEach(block => {
                let inner = block.replace(/<style[^>]*>/i, "").replace(/<\/style>/i, "");
                extractedCss += inner + "\n";
                extractedHtml = extractedHtml.replace(block, ""); 
            });
            sessions.css.setValue(extractedCss.trim());
        } else {
            sessions.css.setValue("");
        }

        if (jsMatch) {
            jsMatch.forEach(block => {
                if(!block.includes("src=")) {
                    let inner = block.replace(/<script[^>]*>/i, "").replace(/<\/script>/i, "");
                    extractedJs += inner + "\n";
                    extractedHtml = extractedHtml.replace(block, ""); 
                }
            });
            sessions.js.setValue(extractedJs.trim());
        } else {
            sessions.js.setValue("");
        }
        
        if(cssMatch || jsMatch) {
             sessions.html.setValue(extractedHtml.trim());
             switchTab('html', document.querySelectorAll('.tab-btn')[1]);
        } else {
             sessions.html.setValue("");
             switchTab('all', document.querySelectorAll('.tab-btn')[0]);
        }

        updatePreview();
    };
    reader.readAsText(file);
    this.value = ''; 
});

function getDocTitle() {
    const match = getCompiledCode().match(/<title>(.*?)<\/title>/i);
    return (match && match[1]) ? match[1].trim().replace(/[\/\\?%*:|"<>]/g, '-') : 'document';
}

function setViewport(device, btn) {
    document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    previewFrame.className = device === 'laptop' ? '' : device;
    setTimeout(applyResponsiveZoom, 50);
}

// EXPORT FUNCTIONS
document.getElementById('btnExportHtml').onclick = () => {
    const link = document.createElement('a');
    link.href = URL.createObjectURL(new Blob([getCompiledCode()], {type:'text/html'}));
    link.download = getDocTitle() + '.html';
    link.click();
};

document.getElementById('btnExportJson').onclick = () => {
    const data = { 
        title: getDocTitle(), 
        all: sessions.all.getValue(), 
        html: sessions.html.getValue(), 
        css: sessions.css.getValue(), 
        js: sessions.js.getValue() 
    };
    const link = document.createElement('a');
    link.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 4)], {type:'application/json'}));
    link.download = getDocTitle() + '.json';
    link.click();
};

document.getElementById('btnExportImg').onclick = () => {
    const el = previewFrame.contentDocument.body; el.style.zoom = "1";
    html2canvas(el, { useCORS: true, scale: 2 }).then(canvas => {
        const link = document.createElement('a'); link.download = getDocTitle() + '.png';
        link.href = canvas.toDataURL(); link.click(); applyResponsiveZoom();
    });
};

document.getElementById('btnExportPdf').onclick = () => {
    const el = previewFrame.contentDocument.body; el.style.zoom = "1";
    let oldBg = el.style.backgroundColor; if (!oldBg || oldBg === 'transparent') el.style.backgroundColor = '#ffffff';
    html2canvas(el, { useCORS: true, scale: 2 }).then(canvas => {
        const imgW = 210, pdfH = Math.max(297, (canvas.height * imgW) / canvas.width);
        html2pdf().set({ margin: 0, filename: getDocTitle() + '.pdf', jsPDF: { unit: 'mm', format: [imgW, pdfH] } }).from(canvas).save().then(() => {
            el.style.backgroundColor = oldBg; applyResponsiveZoom();
        });
    });
};

document.getElementById('btnNewTab').onclick = () => {
    const win = window.open();
    win.document.write(getCompiledCode());
    win.document.close();
};

// DRAGGABLE SEARCH PANEL
const panel = document.getElementById("searchPanel"), header = document.getElementById("searchHeader");
let isDraggingSearch = false, searchOffset = [0, 0];

const startDragSearch = (e) => {
    isDraggingSearch = true;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    searchOffset = [panel.offsetLeft - clientX, panel.offsetTop - clientY];
};
const dragSearch = (e) => {
    if (!isDraggingSearch) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    panel.style.left = (clientX + searchOffset[0]) + "px";
    panel.style.top = (clientY + searchOffset[1]) + "px";
    panel.style.transform = "none";
};
const endDragSearch = () => { isDraggingSearch = false; };

header.addEventListener('mousedown', startDragSearch);
header.addEventListener('touchstart', startDragSearch, {passive: true});
document.addEventListener('mousemove', dragSearch);
document.addEventListener('touchmove', dragSearch, {passive: true});
document.addEventListener('mouseup', endDragSearch);
document.addEventListener('touchend', endDragSearch);

function closeSearch() { panel.style.display = 'none'; editor.focus(); }

document.getElementById('searchInput').oninput = function() {
    document.getElementById('matchStatus').innerText = editor.findAll(this.value, { wrap: true }) + " matches";
};

document.getElementById('btnSearch').onclick = () => {
    panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    if (panel.style.display === 'flex') {
        const input = document.getElementById('searchInput');
        input.focus();
        
        let selectedText = editor.getSelectedText();
        if(selectedText) {
            input.value = selectedText;
            document.getElementById('matchStatus').innerText = editor.findAll(selectedText, { wrap: true }) + " matches";
        }
    }
};

document.getElementById('btnTheme').onclick = () => {
    const isDark = document.body.classList.toggle('dark-mode');
    document.body.classList.toggle('light-mode', !isDark);
    editor.setTheme(isDark ? "ace/theme/monokai" : "ace/theme/textmate");
};

function formatCode() { 
    let val = editor.getValue();
    let mode = editor.session.getMode().$id;
    if (mode === "ace/mode/javascript") {
        editor.setValue(js_beautify(val, { indent_size: 4 }), -1);
    } else if (mode === "ace/mode/css") {
        editor.setValue(css_beautify(val, { indent_size: 4 }), -1);
    } else {
        editor.setValue(html_beautify(val, { indent_size: 4 }), -1);
    }
}

document.getElementById('btnClear').onclick = () => { 
    Object.values(sessions).forEach(s => s.setValue("")); 
    updatePreview(); 
};

// RESIZER
const resizer = document.getElementById('resizer'), editorBox = document.getElementById('editorBox');
let isResizing = false;

const startResize = () => { isResizing = true; document.body.style.userSelect = 'none'; document.getElementById('previewBox').style.pointerEvents = 'none'; };
const doResize = (e) => {
    if (!isResizing) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    if (isHorizontal) {
        let mainRect = document.querySelector('.main-area').getBoundingClientRect();
        let p = ((mainRect.bottom - clientY) / mainRect.height) * 100;
        if (p > 10 && p < 90) { editorBox.style.height = p + '%'; editor.resize(); }
    } else {
        let p = (clientX / window.innerWidth) * 100;
        if (p > 10 && p < 90) { editorBox.style.width = p + '%'; editor.resize(); }
    }
};
const endResize = () => { isResizing = false; document.body.style.userSelect = 'auto'; document.getElementById('previewBox').style.pointerEvents = 'auto'; };

resizer.addEventListener('mousedown', startResize);
resizer.addEventListener('touchstart', startResize, {passive: true});
window.addEventListener('mousemove', doResize);
window.addEventListener('touchmove', doResize, {passive: true});
window.addEventListener('mouseup', endResize);
window.addEventListener('touchend', endResize);

// SMART RESPONSIVE ZOOM FOR IFRAME (UPDATED FOR PERFECT CENTERING)
function applyResponsiveZoom() {
    const doc = previewFrame.contentDocument; if (!doc?.body) return;
    
    doc.body.style.zoom = '1';
    
    let isMobile = previewFrame.classList.contains('mobile');
    let isTablet = previewFrame.classList.contains('tablet');

    let targetWidth = isMobile ? 375 : isTablet ? 768 : previewFrame.clientWidth;
    let targetHeight = isMobile ? 667 : isTablet ? 1024 : previewFrame.clientHeight;

    let containerBox = document.getElementById('previewBox');
    let containerWidth = containerBox.clientWidth - 40;
    let containerHeight = containerBox.clientHeight - 40; 
    
    if (isMobile || isTablet) {
        let scaleX = containerWidth / targetWidth;
        let scaleY = containerHeight / targetHeight;
        let scaleRatio = Math.min(scaleX, scaleY, 1); 
        
        previewFrame.style.transform = `scale(${scaleRatio})`;
        previewFrame.style.transformOrigin = 'center center';
    } else {
         previewFrame.style.transform = 'none';
    }
}
new ResizeObserver(() => applyResponsiveZoom()).observe(document.getElementById('previewBox'));
</script>
